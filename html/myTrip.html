<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행 앨범</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">
        <h1>🌍 나의 여행 앨범 🎵</h1>

        <audio controls>
            <source src="../media/music.mp3" type="audio/mpeg">
            브라우저가 오디오 태그를 지원하지 않습니다.
        </audio>

        <hr>
        <div class="trip-grid">
            <p class="trip-card">
                <img
                    src="../media/리장.jpg"
                    width="310"
                    height="155"
                    alt="리장 호도협"
                >
                <br>
                리장 호도협
                <br>
                (2025년)
            </p>

            <p class="trip-card">
                <img
                    src="../media/세부.jpg"
                    width="310"
                    height="155"
                    alt="세부 탑스힐"
                >
                <br>
                세부 탑스힐
                <br>
                (2024년)
            </p>

            <p class="trip-card">
                <img
                    src="../media/홋카이도.jpg"
                    width="310"
                    height="155"
                    alt="홋카이도 대설산"
                >
                <br>
                홋카이도 대설산
                <br>
                (2025년)
            </p>
        </div>
        <hr>

        <h2>📹 나의 여행 브이로그</h2>

        <p>
            <video width="310" height="175" controls>
                <source src="../media/video.mp4" type="video/mp4">
                브라우저가 비디오 태그를 지원하지 않습니다.
            </video>

            <br>
            리장의 아름다운 음악 ✈️
        </p>
    </div>
</body>
</html>
