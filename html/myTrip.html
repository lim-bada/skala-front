<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행 앨범</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">
        <h1>🌍 나의 여행 앨범 🎵</h1>

        <audio controls>
            <source src="../media/music.mp3" type="audio/mpeg">
            브라우저가 오디오 태그를 지원하지 않습니다.
        </audio>

        <hr>
        <div class="trip-grid">
            <p class="trip-card">
                <img
                    src="../media/코난해변.jpeg"
                    width="310"
                    height="155"
                    alt="코난 해변"
                    class="clickable-image"
                    onclick="openImageModal(this.src, this.alt)"
                >
                <br>
                코난 해변
                <br>
                (2025년)
            </p>

            <p class="trip-card">
                <img
                    src="../media/제주바다목장.jpeg"
                    width="310"
                    height="155"
                    alt="제주바다목장"
                    class="clickable-image"
                    onclick="openImageModal(this.src, this.alt)"
                >
                <br>
                제주바다목장
                <br>
                (2025년)
            </p>

            <p class="trip-card">
                <img
                    src="../media/삼양해수욕장.jpeg"
                    width="310"
                    height="155"
                    alt="삼양해수욕장"
                    class="clickable-image"
                    onclick="openImageModal(this.src, this.alt)"
                >
                <br>
                삼양해수욕장
                <br>
                (2025년)
            </p>
        </div>
        <hr>

        <h2>📹 나의 여행 브이로그</h2>

        <p>
            <video width="310" height="175" controls>
                <source src="../media/jeju.MOV" type="video/mp4">
                브라우저가 비디오 태그를 지원하지 않습니다.
            </video>

            <br>
            서귀포 바다
        </p>

        <hr>

        <section class="page-navigation">
            <h2>👉 이동하기</h2>

            <ul>
                <li>
                    <a href="myHoliday.html">🏖️ 휴일 계획 보기</a>
                </li>

                <li>
                    <a href="myStudy.html">📚 나의 학습 기록 및 계획 보기</a>
                </li>

                <li>
                    <a href="index.html">🏠 메인 페이지로 돌아가기</a>
                </li>
            </ul>
        </section>

    </div>

    <!-- 여행 사진 원본을 크게 보여주는 모달 창 -->
    <div
        id="imageModal"
        class="image-modal"
        aria-hidden="true"
        onclick="closeImageModal(event)"
    >
        <button
            type="button"
            class="image-modal-close"
            onclick="closeImageModal()"
            aria-label="사진 닫기"
        >
            &times;
        </button>

        <img
            id="modalImage"
            class="image-modal-content"
            src=""
            alt=""
        >

        <p id="modalCaption" class="image-modal-caption"></p>
    </div>

    <script src="../script/imageModal.js"></script>
</body>
</html>
